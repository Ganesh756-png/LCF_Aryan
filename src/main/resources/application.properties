# Spring Boot Application Properties
spring.application.name=local-service-finder

# Server Configuration
server.port=8080

# Database Configuration (PostgreSQL / Supabase)
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:local_service_finder}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Initialization from schema.sql
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# Supabase Auth JWT Secret (used to decode and verify JWT signatures)
# Ensure this is replaced with your Supabase JWT secret (Project Settings > API > JWT Secret)
# Note: For local test fallback, a mock verification will run if this is left as the placeholder.
jwt.secret=${JWT_SECRET:supabase_jwt_secret_placeholder_must_be_at_least_256_bits_long_abcdefghijklmnopqrstuvwxyz123456}

# Spring Mail Configuration (Dummy setup by default)
spring.mail.host=${MAIL_HOST:smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:placeholder_user}
spring.mail.password=${MAIL_PASSWORD:placeholder_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Enable file size limits for profile picture uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
