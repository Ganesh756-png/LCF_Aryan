<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local Service Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <a class="navbar-brand d-inline-flex align-items-center mb-3 fs-3" href="index.html">
                    <i class="bi bi-briefcase-fill me-2 text-primary"></i>
                    <span class="fw-bold text-dark">LocalFinder</span>
                </a>
                <h4 class="fw-bold mb-1">Welcome Back</h4>
                <p class="text-muted small">Access your account and bookings</p>
            </div>

            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control form-control-custom border-start-0" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label small fw-bold text-muted">PASSWORD</label>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control form-control-custom border-start-0" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-lg">Sign In</button>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Don't have an account? <a href="register.html" class="fw-bold text-primary text-decoration-none">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Script loading -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Re-route if already logged in
            if (isLoggedIn()) {
                const user = getUser();
                if (user.role === "ADMIN") window.location.href = "admin-dashboard.html";
                else if (user.role === "PROVIDER") window.location.href = "provider-dashboard.html";
                else window.location.href = "user-dashboard.html";
            }

            document.getElementById("loginForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                const alertBox = document.getElementById("alertBox");
                alertBox.classList.add("d-none");

                fetch("/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                })
                .then(res => {
                    if (!res.ok) {
                        return res.json().then(err => { throw new Error(err.error || "Authentication failed") });
                    }
                    return res.json();
                })
                .then(data => {
                    // Set JWT session
                    setSession(data.token, {
                        id: data.userId,
                        email: data.email,
                        name: data.name,
                        role: data.role,
                        isApproved: data.isApproved
                    });

                    // Redirect to respective dashboard
                    if (data.role === "ADMIN") {
                        window.location.href = "admin-dashboard.html";
                    } else if (data.role === "PROVIDER") {
                        window.location.href = "provider-dashboard.html";
                    } else {
                        // Check if redirect query exists
                        const params = new URLSearchParams(window.location.search);
                        const redirect = params.get("redirect");
                        window.location.href = redirect ? decodeURIComponent(redirect) : "user-dashboard.html";
                    }
                })
                .catch(err => {
                    alertBox.textContent = err.message;
                    alertBox.classList.remove("d-none");
                });
            });
        });
    </script>
</body>
</html>
